<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Credit Tracker</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #b8b8ff;
            --accent-green: #00d9a5;
            --accent-yellow: #ffd93d;
            --accent-red: #ff6b6b;
            --accent-purple: #6d4aff;
            --border-radius: 16px;
            --gauge-shadow: rgba(109, 74, 255, 0.3);
        }

        .light-mode {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --text-primary: #2d2d44;
            --text-secondary: #5a5a7a;
            --gauge-shadow: rgba(109, 74, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--accent-purple);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .toggle-btn {
            background: var(--bg-secondary);
            border: 2px solid var(--accent-purple);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            transform: scale(1.05);
        }

        .flash-warning {
            animation: flashRed 0.8s ease-in-out 3;
        }

        @keyframes flashRed {
            0%, 100% { box-shadow: none; }
            50% { box-shadow: 0 0 30px var(--accent-red) inset; }
        }
        .dashboard-card {
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 20px var(--gauge-shadow);
            border: 3px solid var(--accent-purple);
            transition: all 0.3s ease;
        }

        .progress-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 20px auto;
        }

        .progress-circle {
            fill: none;
            stroke: var(--accent-purple);
            stroke-width: 18;
            transform: rotate(-90deg);
            transform-origin: center;
            transition: stroke-dashoffset 0.8s ease;
        }

        .progress-bg {
            fill: none;
            stroke: var(--text-secondary);
            stroke-width: 18;
            opacity: 0.2;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 900;
            color: var(--accent-purple);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: var(--bg-primary);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--accent-purple);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--accent-green);
        }

        .stat-value.warning {
            color: var(--accent-red);
        }

        .status-indicator {
            font-size: 1.1rem;
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            background: rgba(109, 74, 255, 0.1);
        }

        .status-indicator.ahead {
            background: rgba(0, 217, 165, 0.15);
            color: var(--accent-green);
        }

        .status-indicator.behind {
            background: rgba(255, 107, 107, 0.15);
            color: var(--accent-red);
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn {
            background: var(--accent-purple);
            border: none;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            min-width: 140px;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(109, 74, 255, 0.5);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            padding: 30px;
            max-width: 450px;
            width: 100%;
            border: 3px solid var(--accent-purple);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.8rem;
            cursor: pointer;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--accent-purple);
            border-radius: 10px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 900;
            text-align: center;
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(109, 74, 255, 0.5);
        }

        .notes-input {
            font-size: 1rem !important;
            text-align: left !important;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-green);
            border: none;
            border-radius: 10px;
            color: #004d35;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(0, 217, 165, 0.5);
        }
    </style>
</head>
<body>
    <!-- Siren Audio -->
    <audio id="sirenSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQQAAAAAAA==" type="audio/wav">
    </audio>

    <div class="container">
        <header class="header">
            <h1>🔄 Claude Credit Tracker</h1>
            <button class="toggle-btn" onclick="toggleTheme()">☀️ Light</button>
        </header>

        <main class="dashboard-card" id="dashboardCard">
            <h2 style="margin-bottom: 20px;">Current Week Status</h2>
            
            <div class="progress-container">
                <svg viewBox="0 0 200 200">
                    <circle class="progress-bg" cx="100" cy="100" r="85"></circle>
                    <circle class="progress-circle" cx="100" cy="100" r="85" 
                            stroke-dasharray="534" stroke-dashoffset="534" id="progressCircle"></circle>
                </svg>
                <div class="progress-text" id="usagePercent">0%</div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">REMAINING</div>
                    <div class="stat-value" id="remainingPercent">100%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">DAYS LEFT</div>
                    <div class="stat-value" id="daysLeft">7</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">DAILY BUDGET</div>
                    <div class="stat-value" id="dailyBudget">14.3%</div>
                </div>
            </div>

            <div class="status-indicator" id="statusIndicator">
                <span id="statusText">On Track</span>
            </div>

            <div class="action-buttons">
                <button class="action-btn" onclick="openLogModal()">⚡ Log Usage</button>
                <button class="action-btn" onclick="openSettingsModal()">⚙️ Settings</button>
                <button class="action-btn" onclick="openDataModal()">💾 Data</button>
            </div>

            <div style="margin-top: 20px; font-size: 0.9rem; color: var(--text-secondary);">
                Last entry: <strong id="lastEntryTime">Never</strong>
            </div>
        </main>
    </div>

    <!-- Log Usage Modal -->
    <div class="modal" id="logModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Log Your Usage</h3>
                <button class="close-btn" onclick="closeLogModal()">×</button>
            </div>
            <div class="input-group">
                <label>What percentage are you AT?</label>
                <input type="number" id="usageInput" placeholder="0-100" min="0" max="100" step="1" autofocus>
            </div>
            <div class="input-group">
                <label>Notes (optional)</label>
                <input type="text" id="notesInput" class="notes-input" placeholder="Heavy usage day">
            </div>
            <button class="submit-btn" onclick="saveUsage()">🔒 Save Entry</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button class="close-btn" onclick="closeSettingsModal()">×</button>
            </div>
            <div class="input-group">
                <label>Reset Day</label>
                <select id="resetDay" class="notes-input" style="font-size: 1rem;">
                    <option value="0">Sunday</option>
                    <option value="1">Monday</option>
                    <option value="2">Tuesday</option>
                    <option value="3" selected>Wednesday</option>
                    <option value="4">Thursday</option>
                    <option value="5">Friday</option>
                    <option value="6">Saturday</option>
                </select>
            </div>
            <div class="input-group">
                <label>Reset Hour (24-hour format)</label>
                <input type="number" id="resetHour" class="notes-input" placeholder="8" min="0" max="23" value="8">
            </div>
            <div class="input-group">
                <label>Account Name</label>
                <input type="text" id="accountName" class="notes-input" placeholder="Claude Pro">
            </div>
            <button class="submit-btn" onclick="saveSettings()">✓ Save Settings</button>
        </div>
    </div>

    <!-- Data Modal -->
    <div class="modal" id="dataModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Data Management</h3>
                <button class="close-btn" onclick="closeDataModal()">×</button>
            </div>
            <p style="margin-bottom: 15px; color: var(--text-secondary);">
                Backup your data or restore from a previous backup file.
            </p>
            <div class="action-buttons" style="flex-direction: column;">
                <button class="submit-btn" onclick="exportData()">📥 Download Backup</button>
                <label class="submit-btn" style="display: inline-block; text-align: center;">
                    📤 Upload Backup
                    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
                </label>
                <button class="submit-btn" style="background: var(--accent-red);" onclick="clearAllData()">🗑️ Clear All Data</button>
            </div>
        </div>
    </div>

    <script>
        const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        
        // Load saved data on startup
        let appData = {
            lastUsage: null,
            usageHistory: [],
            settings: {
                resetDay: 3, // Wednesday
                resetHour: 8,
                accountName: 'Claude Pro',
                theme: 'dark'
            }
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            applyTheme();
            updateDashboard();
            setupAudio();
        });

        function setupAudio() {
            // Create a simple alarm tone using Web Audio API
            window.sirenAudioContext = new (window.AudioContext || window.webkitAudioContext)();
            playWarningSound = () => {
                try {
                    const ctx = window.sirenAudioContext;
                    if (ctx.state === 'suspended') ctx.resume();
                    
                    const oscillator = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(440, ctx.currentTime);
                    oscillator.frequency.setValueAtTime(220, ctx.currentTime + 0.15);
                    oscillator.frequency.setValueAtTime(440, ctx.currentTime + 0.3);
                    oscillator.frequency.setValueAtTime(220, ctx.currentTime + 0.45);
                    
                    gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    
                    oscillator.start();
                    oscillator.stop(ctx.currentTime + 0.6);
                } catch(e) { /* Audio blocked by browser */ }
            };
        }

        function loadData() {
            const saved = localStorage.getItem('cloudeTrackerData');
            if (saved) {
                appData = JSON.parse(saved);
                if (!appData.settings) appData.settings = { resetDay: 3, resetHour: 8, accountName: 'Claude Pro', theme: 'dark' };
            }
            document.getElementById('resetDay').value = appData.settings.resetDay;
            document.getElementById('resetHour').value = appData.settings.resetHour;
            document.getElementById('accountName').value = appData.settings.accountName;
            document.getElementById('lastEntryTime').textContent = 
                appData.lastUsage ? new Date(appData.lastUsage.timestamp).toLocaleString() : 'Never';
        }

        function saveData() {
            localStorage.setItem('cloudeTrackerData', JSON.stringify(appData));
        }

        function getDaysUntilReset() {
            const now = new Date();
            const nextReset = new Date(now);
            nextReset.setHours(appData.settings.resetHour, 0, 0, 0);
            nextReset.setDate(nextReset.getDate() + (appData.settings.resetDay - now.getDay()));
            
            if (nextReset <= now && (now.getDay() !== appData.settings.resetDay || now.getHours() < appData.settings.resetHour)) {
                nextReset.setDate(nextReset.getDate() + 7);
            }
            
            const diffMs = nextReset - now;
            const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            return Math.max(0, days);
        }

        function getCurrentUsage() {
            if (!appData.lastUsage) return 0;
            return parseFloat(appData.lastUsage.percent) || 0;
        }

        function updateDashboard() {
            const currentUsage = getCurrentUsage();
            const remaining = 100 - currentUsage;
            const daysLeft = getDaysUntilReset();
            const dailyBudget = daysLeft > 0 ? (remaining / daysLeft).toFixed(1) : 0;
            
            const expectedUsagePerDay = 100 / 7;
            const dayIndex = (new Date().getDay() - appData.settings.resetDay + 7) % 7;
            const expectedUsage = ((dayIndex + 1) * expectedUsagePerDay).toFixed(1);
            
            const isAhead = currentUsage <= parseFloat(expectedUsage) + 5;
            const statusEl = document.getElementById('statusIndicator');
            const statusTextEl = document.getElementById('statusText');
            
            statusEl.className = `status-indicator ${isAhead ? 'ahead' : 'behind'}`;
            statusTextEl.textContent = isAhead ? "🟢 On Track" : "🔴 Behind Pace";
            
            if (parseFloat(dailyBudget) < 5 && daysLeft > 1) {
                triggerWarning();
            }
            
            document.getElementById('usagePercent').textContent = `${currentUsage}%`;
            document.getElementById('remainingPercent').textContent = `${remaining.toFixed(1)}%`;
            document.getElementById('remainingPercent').style.color = remaining < 20 ? '#ff6b6b' : '#00d9a5';
            document.getElementById('daysLeft').textContent = daysLeft;
            document.getElementById('dailyBudget').textContent = `${dailyBudget}%`;
            
            const progressCircle = document.getElementById('progressCircle');
            const circumference = 2 * Math.PI * 85;
            const offset = circumference - (currentUsage / 100) * circumference;
            progressCircle.style.strokeDashoffset = offset;
            progressCircle.style.stroke = currentUsage > 85 ? '#ff6b6b' : currentUsage > 50 ? '#ffd93d' : '#00d9a5';
        }

        function triggerWarning() {
            const card = document.getElementById('dashboardCard');
            card.classList.add('flash-warning');
            setTimeout(() => card.classList.remove('flash-warning'), 2500);
            if (typeof playWarningSound === 'function') playWarningSound();
        }
        function openLogModal() {
            document.getElementById('logModal').classList.add('active');
            document.getElementById('usageInput').focus();
            document.getElementById('usageInput').value = getCurrentUsage();
        }

        function closeLogModal() {
            document.getElementById('logModal').classList.remove('active');
        }

        function openSettingsModal() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function openDataModal() {
            document.getElementById('dataModal').classList.add('active');
        }

        function closeDataModal() {
            document.getElementById('dataModal').classList.remove('active');
        }

        function saveUsage() {
            const percent = document.getElementById('usageInput').value;
            const notes = document.getElementById('notesInput').value;
            
            if (percent === '' || percent < 0 || percent > 100) {
                alert('Please enter a valid percentage (0-100)');
                return;
            }
            
            appData.lastUsage = {
                timestamp: Date.now(),
                percent: parseFloat(percent),
                notes: notes,
                day: DAYS[new Date().getDay()]
            };
            appData.usageHistory.push(appData.lastUsage);
            saveData();
            updateDashboard();
            closeLogModal();
            
            document.getElementById('usageInput').value = '';
            document.getElementById('notesInput').value = '';
        }

        function saveSettings() {
            appData.settings.resetDay = parseInt(document.getElementById('resetDay').value);
            appData.settings.resetHour = parseInt(document.getElementById('resetHour').value) || 8;
            appData.settings.accountName = document.getElementById('accountName').value || 'Claude Pro';
            saveData();
            closeSettingsModal();
            updateDashboard();
        }

        function toggleTheme() {
            const btn = document.querySelector('.toggle-btn');
            if (document.body.classList.contains('light-mode')) {
                document.body.classList.remove('light-mode');
                btn.textContent = '☀️ Light';
                appData.settings.theme = 'dark';
            } else {
                document.body.classList.add('light-mode');
                btn.textContent = '🌙 Dark';
                appData.settings.theme = 'light';
            }
            saveData();
        }

        function applyTheme() {
            if (appData.settings.theme === 'light') {
                document.body.classList.add('light-mode');
                document.querySelector('.toggle-btn').textContent = '🌙 Dark';
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(appData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `claude-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            closeDataModal();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.lastUsage && imported.usageHistory && imported.settings) {
                        appData = imported;
                        saveData();
                        updateDashboard();
                        applyTheme();
                        loadData();
                        closeDataModal();
                        alert('✅ Data restored successfully!');
                    } else {
                        alert('Invalid backup file format.');
                    }
                } catch (err) {
                    alert('Error parsing file: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            if (confirm('⚠️ This will delete ALL data. Continue?')) {
                localStorage.removeItem('cloudeTrackerData');
                location.reload();
            }
        }

        // Close modals on outside click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });
        });
    </script>
</body>
</html>
